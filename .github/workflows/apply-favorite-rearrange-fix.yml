name: Apply favorite and rearrange fixes

on:
  push:
    branches:
      - fix/favorite-and-zoom-rearrange
    paths:
      - .github/workflows/apply-favorite-rearrange-fix.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/favorite-and-zoom-rearrange
      - name: Patch index.html
        shell: python
        run: |
          from pathlib import Path

          path = Path("index.html")
          text = path.read_text(encoding="utf-8")

          replacements = []

          replacements.append((
              '  let view = { scale:1, x:0, y:0 };\n  let size = { w:800, h:520 };',
              '  let view = { scale:1, x:0, y:0 };\n  let rearrangeWorldBounds = null;\n  let size = { w:800, h:520 };'
          ))

          replacements.append((
              '  function screenToWorld(pos){ return {x:(pos.x-view.x)/view.scale, y:(pos.y-view.y)/view.scale}; }\n  function moveDraggedNode(screen){',
              '''  function screenToWorld(pos){ return {x:(pos.x-view.x)/view.scale, y:(pos.y-view.y)/view.scale}; }
  function getVisibleWorldBounds(){
    const topLeft=screenToWorld({x:0,y:0}), bottomRight=screenToWorld({x:size.w,y:size.h});
    const left=Math.min(topLeft.x,bottomRight.x), right=Math.max(topLeft.x,bottomRight.x);
    const top=Math.min(topLeft.y,bottomRight.y), bottom=Math.max(topLeft.y,bottomRight.y);
    return {left,right,top,bottom,width:right-left,height:bottom-top,centerX:(left+right)/2,centerY:(top+bottom)/2};
  }
  function getPhysicsBounds(){
    return rearrangeWorldBounds || {left:0,right:size.w,top:0,bottom:size.h,width:size.w,height:size.h,centerX:size.w/2,centerY:size.h/2};
  }
  function moveDraggedNode(screen){'''
          ))

          replacements.append((
              '  function resetView(){ view={scale:1,x:0,y:0}; updateZoomLabel(); lastFrameTime=0; requestCanvasFrame(); toast("表示をリセットしました。"); }',
              '  function resetView(){ view={scale:1,x:0,y:0}; rearrangeWorldBounds=null; updateZoomLabel(); lastFrameTime=0; requestCanvasFrame(); toast("表示をリセットしました。"); }'
          ))

          replacements.append((
              '  function initPhysics(near=false){\n    const graph = buildGraph();',
              '  function initPhysics(near=false){\n    rearrangeWorldBounds=null;\n    const graph = buildGraph();'
          ))

          replacements.append((
              '    const graph = buildGraph(), ids = graph.nodes.map(n=>n.id), edges = graph.edges, w=size.w, h=size.h;\n    const nodeById = new Map(graph.nodes.map(n=>[n.id,n]));',
              '    const graph = buildGraph(), ids = graph.nodes.map(n=>n.id), edges = graph.edges, w=size.w, h=size.h;\n    const bounds=getPhysicsBounds();\n    const nodeById = new Map(graph.nodes.map(n=>[n.id,n]));'
          ))

          replacements.append((
              '''      if(node?.type === "tag"){
        const index = tagNodes.findIndex(n=>n.id===id);
        const radius = Math.min(w,h) * (tagNodes.length <= 1 ? 0 : .30);
        const angle = -Math.PI/2 + (Math.PI*2*index)/Math.max(tagNodes.length,1);
        p.vx += (w/2 + Math.cos(angle)*radius - p.x) * .004;
        p.vy += (h/2 + Math.sin(angle)*radius - p.y) * .004;
      }else{
        p.vx += (w/2 - p.x) * .00025; p.vy += (h/2 - p.y) * .00025;
      }
      p.vx *= .86; p.vy *= .86; p.x += p.vx; p.y += p.vy;
      maxSpeed=Math.max(maxSpeed,Math.abs(p.vx)+Math.abs(p.vy));
      const margin = node?.type === "tag" ? 68 : 42;
      p.x = Math.max(margin, Math.min(w-margin, p.x)); p.y = Math.max(56, Math.min(h-56, p.y));''',
              '''      if(node?.type === "tag"){
        const index = tagNodes.findIndex(n=>n.id===id);
        const radius = Math.min(bounds.width,bounds.height) * (tagNodes.length <= 1 ? 0 : .30);
        const angle = -Math.PI/2 + (Math.PI*2*index)/Math.max(tagNodes.length,1);
        p.vx += (bounds.centerX + Math.cos(angle)*radius - p.x) * .004;
        p.vy += (bounds.centerY + Math.sin(angle)*radius - p.y) * .004;
      }else{
        p.vx += (bounds.centerX - p.x) * .00025; p.vy += (bounds.centerY - p.y) * .00025;
      }
      p.vx *= .86; p.vy *= .86; p.x += p.vx; p.y += p.vy;
      maxSpeed=Math.max(maxSpeed,Math.abs(p.vx)+Math.abs(p.vy));
      const margin = (node?.type === "tag" ? 68 : 42) / Math.max(view.scale,.01);
      const verticalMargin = 56 / Math.max(view.scale,.01);
      p.x = clamp(p.x,bounds.left+margin,bounds.right-margin);
      p.y = clamp(p.y,bounds.top+verticalMargin,bounds.bottom-verticalMargin);'''
          ))

          replacements.append((
              '<div class="detail-actions"><button id="editNoteBtn">編集</button><button id="copyNoteBtn">Markdownコピー</button><button class="danger" id="deleteNoteBtn">削除</button><button class="ghost" id="closeDetailBtn">閉じる</button></div>',
              '<div class="detail-actions"><button type="button" id="favoriteDetailBtn" class="favorite-button ${n.favorite?"active":""}" aria-label="${n.favorite?"お気に入りから外す":"お気に入りに追加"}" aria-pressed="${n.favorite?"true":"false"}" title="${n.favorite?"お気に入りから外す":"お気に入りに追加"}">${n.favorite?"★":"☆"}</button><button id="editNoteBtn">編集</button><button id="copyNoteBtn">Markdownコピー</button><button class="danger" id="deleteNoteBtn">削除</button><button class="ghost" id="closeDetailBtn">閉じる</button></div>'
          ))

          replacements.append((
              '    $("closeDetailBtn").onclick = () => { selectedId=null; focusedNodeId=null; render(); };\n    $("editNoteBtn").onclick = () => openEditor();',
              '    $("closeDetailBtn").onclick = () => { selectedId=null; focusedNodeId=null; render(); };\n    $("favoriteDetailBtn").onclick = () => toggleFavorite(n.id);\n    $("editNoteBtn").onclick = () => openEditor();'
          ))

          replacements.append((
              '  function shakeGraph(){ clearNodeLayouts(); for(const id of Object.keys(physics)){ physics[id].x=size.w/2+(Math.random()-.5)*size.w*.62; physics[id].y=size.h/2+(Math.random()-.5)*size.h*.62; physics[id].vx=0; physics[id].vy=0; physics[id].pinned=false; } graphLabelLayout=new Map(); graphLabelLayoutAt=0; wakePhysics(); toast("固定位置を解除して再配置しました。"); }',
              '''  function shakeGraph(){
    clearNodeLayouts();
    rearrangeWorldBounds=getVisibleWorldBounds();
    const marginX=Math.min(rearrangeWorldBounds.width*.18,72/Math.max(view.scale,.01));
    const marginY=Math.min(rearrangeWorldBounds.height*.18,72/Math.max(view.scale,.01));
    const usableWidth=Math.max(1,rearrangeWorldBounds.width-marginX*2);
    const usableHeight=Math.max(1,rearrangeWorldBounds.height-marginY*2);
    for(const id of Object.keys(physics)){
      physics[id].x=rearrangeWorldBounds.left+marginX+Math.random()*usableWidth;
      physics[id].y=rearrangeWorldBounds.top+marginY+Math.random()*usableHeight;
      physics[id].vx=0; physics[id].vy=0; physics[id].pinned=false;
    }
    graphLabelLayout=new Map(); graphLabelLayoutAt=0; wakePhysics();
    toast("現在の表示範囲全体へ再配置しました。");
  }'''
          ))

          for old, new in replacements:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"Expected exactly one match, found {count}: {old[:100]!r}")
              text = text.replace(old, new, 1)

          path.write_text(text, encoding="utf-8")
      - name: Validate JavaScript syntax
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          html=Path('index.html').read_text(encoding='utf-8')
          scripts=re.findall(r'<script>([\s\S]*?)</script>',html)
          if not scripts:
              raise SystemExit('No inline script found')
          Path('/tmp/hoshizucho.js').write_text('\n'.join(scripts),encoding='utf-8')
          PY
          node --check /tmp/hoshizucho.js
          grep -q 'favoriteDetailBtn' index.html
          grep -q 'getVisibleWorldBounds' index.html
      - name: Commit fixes
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "fix: sync detail favorites and zoom-aware rearrange"
          git push origin HEAD:fix/favorite-and-zoom-rearrange
